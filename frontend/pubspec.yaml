name: leopard
description: LEOPARD - Freight Transport Platform for Vietnam
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.0
  equatable: ^2.0.0

  # Dependency Injection
  get_it: ^7.7.0

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.0
  web_socket_channel: ^2.4.0

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  firebase_messaging: ^14.9.0
  google_sign_in: ^6.2.0

  # Maps & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^12.0.0

  # Storage
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.2.0

  # UI Components
  image_picker: ^1.1.0
  qr_flutter: ^4.1.0
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.0

  # Internationalization
  intl: ^0.19.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  freezed: ^2.5.0
  bloc_test: ^9.1.0
  mocktail: ^1.0.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  generate: true
