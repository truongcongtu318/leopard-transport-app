# LEOPARD Docker Compose — Development Environment
# Usage: cp .env.example .env && docker compose up -d

version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: leopard-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-leopard}
      POSTGRES_USER: ${POSTGRES_USER:-leopard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-leopard} -d ${POSTGRES_DB:-leopard}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - leopard_network

  redis:
    image: redis:7.2-alpine
    container_name: leopard-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 900 1 --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - leopard_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: leopard-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - leopard_network

  adminer:
    image: adminer:latest
    container_name: leopard-adminer
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: nette
    depends_on:
      - postgres
    networks:
      - leopard_network
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:
  backend_uploads:

networks:
  leopard_network:
    name: leopard_network
    driver: bridge
